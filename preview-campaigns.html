<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERA-VIS — Preview Campaign Month Sort</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --page:    #F8FAFC; --white:  #FFFFFF;
  --ink:     #0F172A; --ink2:   #334155; --muted: #64748B; --muted2: #94A3B8;
  --border:  #E2E8F0; --border2: #CBD5E1;
  --gold:    #D97706; --gold-bg:   #FFFBEB;
  --teal:    #0B8F6C; --teal-bg:   #E6F7F2;
  --red:     #DC2626; --red-bg:    #FEF2F2;
  --blue:    #2563EB; --blue-bg:   #EFF6FF;
  --orange:  #EA580C; --orange-bg: #FFF7ED;
  --purple:  #7C3AED; --purple-bg: #F5F3FF;
  --green:   #16A34A; --green-bg:  #F0FDF4;
  --shadow:    0 1px 3px rgba(15,23,42,.06), 0 4px 12px rgba(15,23,42,.04);
  --shadow-md: 0 4px 16px rgba(15,23,42,.09), 0 8px 32px rgba(15,23,42,.06);
  --r: 16px; --r-sm: 10px;
  --font: 'Inter', system-ui, sans-serif;
  --mono: ui-monospace, monospace;
}

html, body { height: 100%; font-family: var(--font); background: var(--page); color: var(--ink);
  -webkit-font-smoothing: antialiased; line-height: 1.5; }

/* ── LAYOUT ── */
.layout { display: flex; height: 100%; }

/* ── SIDEBAR ── */
.sidebar {
  width: 240px; flex-shrink: 0; background: var(--white);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  padding: 20px 14px; gap: 4px;
}
.sidebar-brand { padding: 8px 12px 20px; }
.sidebar-brand .brand-name { font-size: 18px; font-weight: 900; color: var(--ink); }
.sidebar-brand .brand-sub  { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; }
.nav-section { font-size: 9px; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 1px; padding: 14px 12px 4px; }
.nav-btn {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px;
  font-size: 13px; font-weight: 500; color: var(--ink2); cursor: pointer; border: none;
  background: transparent; width: 100%; text-align: left; transition: all .15s;
}
.nav-btn:hover { background: var(--page); }
.nav-btn.active { background: var(--blue-bg); color: var(--blue); font-weight: 700; }
.nav-btn .ico { font-size: 15px; width: 20px; text-align: center; }

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; padding: 28px 32px; }
.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-title-block .page-title { font-size: 22px; font-weight: 900; color: var(--ink); }
.page-title-block .page-sub   { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
.btn { padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
  border: 1px solid var(--border); background: var(--white); cursor: pointer; transition: all .15s; }
.btn:hover { background: var(--page); }
.btn-primary { background: var(--blue); color: white; border-color: var(--blue); }
.btn-primary:hover { background: #1d4ed8; }
.btn-teal { background: var(--teal-bg); color: var(--teal); border-color: var(--teal); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── MONTH FILTER TOOLBAR ── */
.month-toolbar {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 20px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.month-toolbar-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.month-tabs { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
.month-tab {
  padding: 5px 11px; border-radius: 8px; font-size: 11.5px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent; transition: all .15s;
  color: var(--muted); background: transparent;
}
.month-tab:hover { background: var(--page); color: var(--ink2); }
.month-tab.active { background: var(--blue); color: white; border-color: var(--blue); }
.month-tab.has-campaigns { border-color: var(--border); color: var(--ink2); }
.month-tab.all.active { background: var(--ink); border-color: var(--ink); }

.sort-controls { display: flex; align-items: center; gap: 8px; }
.sort-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.sort-select {
  padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border);
  font-size: 12px; background: var(--white); color: var(--ink2); cursor: pointer;
  font-family: var(--font);
}

/* ── STATS SUMMARY BAR ── */
.stats-bar {
  display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.stat-pill {
  background: var(--white); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 16px; display: flex; align-items: center; gap: 8px;
}
.stat-pill-val { font-size: 18px; font-weight: 900; }
.stat-pill-lbl { font-size: 11px; color: var(--muted); }
.stat-pill.blue .stat-pill-val { color: var(--blue); }
.stat-pill.teal .stat-pill-val { color: var(--teal); }
.stat-pill.gold .stat-pill-val { color: var(--gold); }
.stat-pill.red  .stat-pill-val { color: var(--red); }

/* ── MONTH GROUP ── */
.month-group { margin-bottom: 28px; }
.month-group-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.month-group-title {
  font-size: 13px; font-weight: 800; color: var(--ink2);
  display: flex; align-items: center; gap: 8px;
}
.month-group-pill {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  font-family: var(--mono);
}
.month-group-pill.current { background: var(--blue-bg); color: var(--blue); }
.month-group-pill.past    { background: var(--border);  color: var(--muted); }
.month-group-pill.future  { background: var(--teal-bg); color: var(--teal); }
.month-group-line { flex: 1; height: 1px; background: var(--border); }
.month-group-count { font-size: 11px; color: var(--muted); font-family: var(--mono); }

/* ── CAMPAIGN GRID ── */
.campaign-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

/* ── CAMPAIGN CARD ── */
.campaign-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px;
  position: relative; transition: all .2s; cursor: pointer;
  animation: fadeUp .25s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.campaign-card:hover {
  border-color: var(--blue); box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.campaign-card.ending-soon { border-color: #FCA5A5; background: #FFF5F5; }
.campaign-card.ending-soon:hover { border-color: var(--red); }

.campaign-actions { position: absolute; top: 14px; right: 14px; display: flex; gap: 5px; }
.campaign-actions button {
  width: 28px; height: 28px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--white);
  cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.campaign-actions button:hover { background: var(--border); }
.campaign-actions .del-btn:hover { background: var(--red-bg); color: var(--red); border-color: var(--red); }

.campaign-badge {
  display: inline-block; padding: 2px 8px; border-radius: 12px;
  font-size: 10px; font-weight: 700; font-family: var(--mono);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px;
}
.campaign-badge.active { background: var(--teal-bg); color: var(--teal); }
.campaign-badge.ended  { background: var(--border);  color: var(--muted); }

.campaign-name { font-size: 14px; font-weight: 800; color: var(--ink); margin-bottom: 4px; line-height: 1.35; padding-right: 60px; }
.campaign-meta { font-size: 11px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
.campaign-meta a { color: var(--blue); }

/* Deadline indicator */
.deadline-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 6px; font-size: 10.5px; font-weight: 700;
  margin-bottom: 10px; font-family: var(--mono);
}
.deadline-badge.overdue  { background: var(--red-bg);    color: var(--red); }
.deadline-badge.urgent   { background: var(--orange-bg); color: var(--orange); }
.deadline-badge.soon     { background: var(--gold-bg);   color: var(--gold); }
.deadline-badge.normal   { background: var(--blue-bg);   color: var(--blue); }
.deadline-badge.ended-dl { background: var(--border);    color: var(--muted); }

/* Progress bar */
.campaign-progress { margin-bottom: 12px; }
.progress-track {
  height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 3px;
}
.progress-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.progress-fill.high   { background: var(--teal); }
.progress-fill.medium { background: var(--gold); }
.progress-fill.low    { background: var(--red); }
.progress-labels { display: flex; justify-content: space-between; font-size: 9.5px; color: var(--muted); font-family: var(--mono); }

.campaign-stats { display: flex; gap: 16px; }
.campaign-stat  { text-align: center; }
.campaign-stat-val { font-size: 20px; font-weight: 900; line-height: 1; }
.campaign-stat-lbl { font-size: 9px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; margin-top: 2px; }

/* Mode tag */
.mode-tag {
  font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 700; margin-left: 6px;
  vertical-align: middle;
}
.mode-excel { background: var(--teal-bg); color: var(--teal); }
.mode-sheet { background: var(--blue-bg); color: var(--blue); }

/* ── EMPTY STATE ── */
.empty-month {
  grid-column: 1/-1; text-align: center; padding: 40px 20px;
  color: var(--muted); font-size: 13px;
}
.empty-month .ico { font-size: 32px; margin-bottom: 8px; }

/* ── FLOATING BADGE (month indicator on card) ── */
.card-month-flag {
  position: absolute; top: 0; left: 20px;
  font-size: 9px; font-weight: 700; font-family: var(--mono);
  background: var(--blue); color: white;
  padding: 0 8px 3px; border-radius: 0 0 6px 6px;
  text-transform: uppercase;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── TOOLTIP BADGE ── */
.new-badge {
  font-size: 8px; font-weight: 800; font-family: var(--mono);
  background: var(--red); color: white; padding: 1px 5px; border-radius: 4px;
  text-transform: uppercase; vertical-align: middle; margin-left: 6px;
}

/* ── MOBILE BOTTOM NAV ── */
.mobile-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: var(--white); border-top: 1px solid var(--border);
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
  display: none; justify-content: space-around; align-items: center;
}
.mobile-nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 9px; font-weight: 600; color: var(--muted);
  padding: 4px 12px; cursor: pointer; border: none; background: none;
}
.mobile-nav-item .ico { font-size: 20px; }
.mobile-nav-item.active { color: var(--blue); }

/* ── MOBILE HEADER ── */
.mobile-topbar {
  display: none;
  position: sticky; top: 0; z-index: 40;
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  align-items: center; justify-content: space-between;
}
.mobile-topbar .brand { font-size: 16px; font-weight: 900; }
.mobile-topbar .sync-btn {
  font-size: 11px; padding: 5px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--white);
  font-weight: 600; cursor: pointer; color: var(--ink2);
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  html, body { overflow: auto; }

  /* Hide desktop sidebar */
  .sidebar { display: none; }

  /* Show mobile elements */
  .mobile-topbar { display: flex; }
  .mobile-nav    { display: flex; }

  /* Main area */
  .main {
    padding: 14px 14px 80px;
  }

  /* Page header — stack vertically */
  .page-header {
    flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 16px;
  }
  .page-title-block .page-title { font-size: 18px; }
  .btn-actions {
    width: 100%; display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .btn-actions .btn-primary {
    grid-column: 1 / -1;
  }
  .btn-actions .btn { font-size: 11px; padding: 7px 10px; text-align: center; }

  /* Stats bar — 2x2 grid */
  .stats-bar {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;
  }
  .stat-pill { padding: 10px 12px; }
  .stat-pill-val { font-size: 16px; }

  /* Month toolbar — stack sort below tabs */
  .month-toolbar {
    flex-direction: column; align-items: flex-start; gap: 10px; padding: 12px 14px;
  }
  .month-tabs {
    width: 100%; display: flex; flex-wrap: nowrap;
    overflow-x: auto; gap: 6px; padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .month-tabs::-webkit-scrollbar { display: none; }
  .month-tab { flex-shrink: 0; }
  .sort-controls { width: 100%; }
  .sort-select { width: 100%; padding: 8px 10px; font-size: 13px; }

  /* Campaign grid — single column */
  .campaign-list { grid-template-columns: 1fr; gap: 10px; }

  /* Month group header */
  .month-group-title { font-size: 12px; }
  .month-group { margin-bottom: 20px; }

  /* Campaign card adjustments */
  .campaign-card { padding: 16px; }
  .campaign-name { font-size: 13px; padding-right: 64px; }
  .campaign-stat-val { font-size: 18px; }
}

@media (max-width: 390px) {
  .btn-actions { grid-template-columns: 1fr 1fr; }
  .stats-bar   { grid-template-columns: 1fr 1fr; }
  .month-tab   { padding: 5px 8px; font-size: 10.5px; }
}
</style>
</head>

      <div style="display:flex;gap:8px;margin-top:8px">
        <button onclick="closeModal()" class="btn" style="flex:1">Batal</button>
        <button onclick="addCampaign()" class="btn btn-primary" style="flex:2">+ Tambah Campaign</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── MOCK DATA ────────────────────────────────────────────────────
const TODAY = new Date('2026-04-18');

const CAMPAIGNS = [
  // April 2026
  { id:'c1', name:'Hanging Mobile & Click N Pick — April 2026', deadline:'2026-04-15', status:'ended',  mode:'sheet', masterSheet:'MASTER GHS', formLink:'#', toko:84,  done:84,  rate:100 },
  { id:'c2', name:'Wobbler Aksesoris',                          deadline:'2026-04-30', status:'active', mode:'excel', toko:131, done:122, rate:93 },
  { id:'c3', name:'Visibility IT AtomGaN Charger 45W',          deadline:'2026-04-30', status:'active', mode:'excel', toko:93,  done:41,  rate:44 },
  { id:'c4', name:'Visibility IT 3-in-1 Wireless Charger Flip Pro', deadline:'2026-04-30', status:'active', mode:'excel', toko:95, done:51, rate:54 },
  { id:'c5', name:'Signboard_Visibility Erafone Ramadan Berbagi', deadline:'2026-04-14', status:'ended', mode:'excel', toko:797, done:791, rate:99 },
  { id:'c6', name:'Visibility Samsung A series A57 | A37 5G',   deadline:'2026-04-30', status:'active', mode:'excel', toko:157, done:99,  rate:63 },
  { id:'c7', name:'NBFI Iphone 15 Series_ERAFONE',             deadline:'2026-04-30', status:'active', mode:'excel', toko:310, done:20,  rate:6  },
  { id:'c8', name:'VISIBILITY_EASEL_ SAMSUNG SERIES A57 & 37_NASA', deadline:'2026-04-30', status:'active', mode:'excel', toko:142, done:48, rate:34 },

];

// ── STATE ────────────────────────────────────────────────────────
let activeMonth = 'all';

const MONTH_NAMES = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

// ── HELPERS ──────────────────────────────────────────────────────
function getDeadlineMonth(c) {
  if (!c.deadline) return null;
  return new Date(c.deadline).getMonth() + 1; // 1-12
}

function getDeadlineDays(c) {
  if (!c.deadline) return null;
  return Math.ceil((new Date(c.deadline) - TODAY) / 864e5);
}

function deadlineBadge(c) {
  if (c.status === 'ended') return `<span class="deadline-badge ended-dl">✅ Selesai · ${c.deadline}</span>`;
  const d = getDeadlineDays(c);
  if (d === null) return '';
  if (d < 0)  return `<span class="deadline-badge overdue">⚠ Lewat ${Math.abs(d)}h · ${c.deadline}</span>`;
  if (d <= 3) return `<span class="deadline-badge urgent">🔴 ${d}h lagi · ${c.deadline}</span>`;
  if (d <= 7) return `<span class="deadline-badge soon">🟡 ${d}h lagi · ${c.deadline}</span>`;
  return `<span class="deadline-badge normal">📅 ${d}h lagi · ${c.deadline}</span>`;
}

function modeTag(c) {
  return c.mode === 'excel'
    ? '<span class="mode-tag mode-excel">📎 Excel</span>'
    : '<span class="mode-tag mode-sheet">🔗 Sheet</span>';
}

function progressClass(rate) {
  if (rate >= 80) return 'high';
  if (rate >= 50) return 'medium';
  return 'low';
}

// ── SORT CAMPAIGNS ───────────────────────────────────────────────
function sortCampaigns(list) {
  const s = document.getElementById('sort-select').value;
  return [...list].sort((a, b) => {
    if (s === 'deadline-asc')  return new Date(a.deadline||'9999') - new Date(b.deadline||'9999');
    if (s === 'deadline-desc') return new Date(b.deadline||'0000') - new Date(a.deadline||'0000');
    if (s === 'rate-desc')     return b.rate - a.rate;
    if (s === 'rate-asc')      return a.rate - b.rate;
    if (s === 'name-asc')      return a.name.localeCompare(b.name);
    if (s === 'name-desc')     return b.name.localeCompare(a.name);
    return 0;
  });
}

// ── RENDER MONTH TABS ────────────────────────────────────────────
function renderMonthTabs() {
  const container = document.getElementById('month-tabs');

  // Find which months have campaigns
  const monthSet = new Set(CAMPAIGNS.map(c => getDeadlineMonth(c)).filter(Boolean));
  const currentMonth = TODAY.getMonth() + 1;

  let html = `<button class="month-tab all ${activeMonth === 'all' ? 'active' : 'has-campaigns'}" onclick="setMonth('all')">Semua</button>`;

  for (let m = 1; m <= 12; m++) {
    const hasCamp = monthSet.has(m);
    const count   = CAMPAIGNS.filter(c => getDeadlineMonth(c) === m).length;
    const isActive = activeMonth === m;
    const cls = isActive ? 'active' : (hasCamp ? 'has-campaigns' : '');
    const isCurrent = m === currentMonth;
    html += `<button class="month-tab ${cls}" onclick="setMonth(${m})" ${hasCamp ? '' : 'style="opacity:.35"'}>
      ${MONTH_SHORT[m-1]}${hasCamp ? `<sup style="font-size:8px;margin-left:2px">${count}</sup>` : ''}
      ${isCurrent && hasCamp ? '<span class="new-badge">Now</span>' : ''}
    </button>`;
  }

  container.innerHTML = html;
}

// ── RENDER STATS BAR ─────────────────────────────────────────────
function renderStatsBar() {
  const filtered = activeMonth === 'all' ? CAMPAIGNS : CAMPAIGNS.filter(c => getDeadlineMonth(c) === activeMonth);
  const total    = filtered.length;
  const active   = filtered.filter(c => c.status === 'active').length;
  const ended    = filtered.filter(c => c.status === 'ended').length;
  const avgRate  = total ? Math.round(filtered.reduce((s,c) => s + c.rate, 0) / total) : 0;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-pill blue"><div class="stat-pill-val">${total}</div><div class="stat-pill-lbl">Total Campaign</div></div>
    <div class="stat-pill teal"><div class="stat-pill-val">${active}</div><div class="stat-pill-lbl">Active</div></div>
    <div class="stat-pill"><div class="stat-pill-val" style="color:var(--muted)">${ended}</div><div class="stat-pill-lbl">Ended</div></div>
    <div class="stat-pill gold"><div class="stat-pill-val">${avgRate}%</div><div class="stat-pill-lbl">Avg Rate</div></div>
  `;
}

// ── RENDER CAMPAIGNS ─────────────────────────────────────────────
function renderCampaigns() {
  renderMonthTabs();
  renderStatsBar();

  const content = document.getElementById('campaigns-content');
  const currentMonth = TODAY.getMonth() + 1;
  const currentYear  = TODAY.getFullYear();

  // Filter by active month
  let filtered = activeMonth === 'all'
    ? CAMPAIGNS
    : CAMPAIGNS.filter(c => getDeadlineMonth(c) === activeMonth);

  filtered = sortCampaigns(filtered);

  if (!filtered.length) {
    content.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--muted)">
      <div style="font-size:40px;margin-bottom:12px">📋</div>
      <div style="font-size:14px;font-weight:600">Tidak ada campaign di bulan ini</div>
    </div>`;
    return;
  }

  if (activeMonth !== 'all') {
    // Single month view — flat grid
    const monthName = MONTH_NAMES[activeMonth - 1];
    const monthPhase = activeMonth < currentMonth ? 'past' : (activeMonth === currentMonth ? 'current' : 'future');
    const phaseLbl   = { past:'Selesai', current:'Bulan Ini', future:'Mendatang' }[monthPhase];

    content.innerHTML = `
      <div class="month-group">
        <div class="month-group-header">
          <div class="month-group-title">
            📅 ${monthName} ${currentYear}
            <span class="month-group-pill ${monthPhase}">${phaseLbl}</span>
          </div>
          <div class="month-group-line"></div>
          <div class="month-group-count">${filtered.length} campaign</div>
        </div>
        <div class="campaign-list">${filtered.map(renderCard).join('')}</div>
      </div>`;
    return;
  }

  // "All" view — group by month
  // Collect months in sorted order
  const monthMap = {};
  filtered.forEach(c => {
    const m = getDeadlineMonth(c);
    if (!monthMap[m]) monthMap[m] = [];
    monthMap[m].push(c);
  });

  const monthsSorted = Object.keys(monthMap).map(Number).sort((a,b) => a-b);

  content.innerHTML = monthsSorted.map(m => {
    const list = monthMap[m];
    const monthName  = MONTH_NAMES[m-1];
    const monthPhase = m < currentMonth ? 'past' : (m === currentMonth ? 'current' : 'future');
    const phaseLbl   = { past:'Selesai', current:'Bulan Ini', future:'Mendatang' }[monthPhase];

    return `<div class="month-group">
      <div class="month-group-header">
        <div class="month-group-title">
          📅 ${monthName} ${currentYear}
          <span class="month-group-pill ${monthPhase}">${phaseLbl}</span>
        </div>
        <div class="month-group-line"></div>
        <div class="month-group-count">${list.length} campaign</div>
      </div>
      <div class="campaign-list">${list.map(renderCard).join('')}</div>
    </div>`;
  }).join('');
}

// ── RENDER SINGLE CARD ───────────────────────────────────────────
function renderCard(c) {
  const days     = getDeadlineDays(c);
  const isUrgent = c.status === 'active' && days !== null && days <= 7;
  const storeMeta = c.mode === 'excel' ? `${c.toko} toko` : `Sheet: ${c.masterSheet || ''}`;
  const pClass   = progressClass(c.rate);

  return `<div class="campaign-card ${isUrgent ? 'ending-soon' : ''}">
    <div class="campaign-actions">
      <button title="Edit">✎</button>
      <button class="del-btn" title="Hapus">✕</button>
    </div>
    <div class="campaign-badge ${c.status}">${c.status === 'ended' ? 'Ended' : 'Active'}</div>
    <div class="campaign-name">${c.name}${modeTag(c)}</div>
    <div style="margin-bottom:8px">${deadlineBadge(c)}</div>
    <div class="campaign-meta">
      ${c.formLink ? `<a href="#">Form</a> · ` : ''}${storeMeta}
    </div>
    <div class="campaign-progress">
      <div class="progress-track">
        <div class="progress-fill ${pClass}" style="width:${c.rate}%"></div>
      </div>
      <div class="progress-labels"><span>${c.done} / ${c.toko} toko</span><span>${c.rate}%</span></div>
    </div>
    <div class="campaign-stats">
      <div class="campaign-stat">
        <div class="campaign-stat-val" style="color:var(--blue)">${c.toko}</div>
        <div class="campaign-stat-lbl">Toko</div>
      </div>
      <div class="campaign-stat">
        <div class="campaign-stat-val" style="color:var(--teal)">${c.done}</div>
        <div class="campaign-stat-lbl">Done</div>
      </div>
      <div class="campaign-stat">
        <div class="campaign-stat-val" style="color:var(--gold)">${c.rate}%</div>
        <div class="campaign-stat-lbl">Rate</div>
      </div>
    </div>
  </div>`;
}

// ── SET ACTIVE MONTH ─────────────────────────────────────────────
function setMonth(m) {
  activeMonth = m;
  renderCampaigns();
}

// ── ADD MODAL ────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('modal-bg').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal-bg').style.display = 'none';
}
function addCampaign() {
  const name     = document.getElementById('m-name').value.trim();
  const month    = parseInt(document.getElementById('m-month').value);
  const deadline = document.getElementById('m-deadline').value;
  const mode     = document.querySelector('input[name="m-mode"]:checked').value;
  const form     = document.getElementById('m-form').value.trim();

  if (!name) { alert('Masukkan nama campaign!'); return; }
  if (!deadline) { alert('Pilih deadline!'); return; }

  CAMPAIGNS.push({
    id: 'c_' + Date.now(),
    name, deadline, status: 'active', mode,
    formLink: form || null,
    toko: 0, done: 0, rate: 0,
    masterSheet: 'MASTER GHS',
  });

  closeModal();
  renderCampaigns();
  // Scroll to the new campaign month
  if (month) setMonth(month);
}

// ── INIT ─────────────────────────────────────────────────────────
renderCampaigns();
</script>
</body>
</html>
